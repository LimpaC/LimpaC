spring.application.name=backend
# Configurações do Banco de Dados (PostgreSQL)
# Altere 'localhost:5432/limpac_db' para o nome do seu banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/limpac_db

spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# 'update' cria as tabelas automaticamente (como a tabela 'calculos' e 'users')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#  Formatação de JSON (para as datas ficarem legíveis nos DTOs)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

app.metrics.co2-per-card=0.044
app.metrics.plastic-per-card=0.00714
app.metrics.trees-per-card=0.0342
app.metrics.water-per-card=12.857
app.metrics.energy-per-card=0.514

# Monetary breakdown (Brazil) used for digital-vs-physical card equivalence.
# Sources used:
# - Material (PVC blank card): Printer Card Shop, pacote 500 unidades por R$ 280,00 -> R$ 0,56/un.
#   https://printercardshop.com.br/produto/pacote-500-cartoes-brancos-pvc-cr-80-alta-qualidade/
# - Manufacturing/printing: Crachá Laminado, 100 unidades por R$ 490,00 -> R$ 4,90/un;
#   less material R$ 0,56/un => R$ 4,34/un de manufatura.
#   https://www.crachalaminado.com.br/produto/cracha-em-pvc-laminado-100-unidades/
# - Shipping baseline: Carta Comercial Correios ate 20g = R$ 3,70 (Portaria MCOM 17.364/2025, Anexo I).
#   https://sintse.tse.jus.br/documentos/2025/Abr/14/para-conhecimento-institucional/portaria-no-17-364-de-7-de-abril-de-2025-define-os-tetos-de-precos-dos-servicos-postais-e
app.metrics.material-cost-per-card-brl=0.56
app.metrics.manufacturing-cost-per-card-brl=4.34
app.metrics.shipping-cost-per-card-brl=3.70
