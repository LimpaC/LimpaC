spring.application.name=backend
# Configurações do Banco de Dados (PostgreSQL)
# Altere 'localhost:5432/limpac_db' para o nome do seu banco de dados
spring.datasource.url=jdbc:postgresql://localhost:5432/limpac_db

spring.datasource.username=postgres
spring.datasource.password=123
spring.datasource.driver-class-name=org.postgresql.Driver

# Configurações do Hibernate / JPA
# 'update' cria as tabelas automaticamente (como a tabela 'calculos' e 'users')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

#  Formatação de JSON (para as datas ficarem legíveis nos DTOs)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=America/Sao_Paulo

app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# PVC card + road freight allowance, rounded to keep the UI readable
app.metrics.co2-per-card=0.0471
app.metrics.plastic-per-card=0.00714
app.metrics.trees-per-card=0.0342
app.metrics.water-per-card=12.857
app.metrics.energy-per-card=0.514

# Monetary breakdown (Brazil) used for digital-vs-physical card equivalence.
# Sources used:
# - Material (PVC blank card): blank CR80 PVC in volume sits around R$ 0,49-0,56/un.
# - Manufacturing/printing: low-volume personalized PVC cards commonly land around R$ 1,50-2,00/un when amortized.
# - Shipping baseline: bulk dispatch amortized across a batch keeps the per-card shipping share below R$ 1,00.
#
# The app uses a conservative low-end proxy of R$ 2,77/card to keep the 350-card reference near R$ 970.
app.metrics.material-cost-per-card-brl=0.49
app.metrics.manufacturing-cost-per-card-brl=1.58
app.metrics.shipping-cost-per-card-brl=0.70
